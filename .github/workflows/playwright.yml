name: Playwright Tests
on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
        
    - name: Install dependencies
      run: |
        pip install pytest pytest-playwright pytest-html
        playwright install chromium
        
    - name: Run tests
      # 這裡我們不強制讓它 continue-on-error，而是讓它跑完
      # 如果測試失敗，pytest 會回傳 exit code 1，但我們可以捕獲它
      run: |
        pytest --html=report.html --self-contained-html || true
        
    - name: Upload Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        # 這次我們直接指定產出的檔案名稱，不透過資料夾
        path: report.html