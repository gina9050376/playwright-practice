name: Playwright Tests

# 正確寫法如下：
on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: |
        pip install pytest pytest-playwright
        playwright install chromium
    - name: Run tests
      run: pytest